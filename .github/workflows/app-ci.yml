name: app-ci

on:
  pull_request:
    paths:
      - 'app/**'
      - 'scripts/**'
      - 'reference-models/**'
      - '.github/workflows/app-ci.yml'
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'scripts/**'
      - 'reference-models/**'
      - '.github/workflows/app-ci.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Verify
        run: npm run verify

  reference-model-package-preflight:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Strict package preflight
        run: python3 scripts/validate_reference_model_package.py --package-dir reference-models/government/v5.0 --strict

  reference-model-package-report:
    runs-on: ubuntu-latest
    needs: reference-model-package-preflight
    if: always()
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Standard package preflight report
        run: python3 scripts/validate_reference_model_package.py --package-dir reference-models/government/v5.0
