name: Feature request
description: Suggest an improvement or new capability
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for sharing an idea. Please describe the problem and the desired outcome.

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem are you trying to solve?
      placeholder: A clear and concise description of the problem.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to happen?
      placeholder: A clear and concise description of the proposed solution.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternatives or workarounds you considered.

  - type: textarea
    id: scope
    attributes:
      label: Scope and impact
      description: Any known impact on UI, data model, migrations, or API behavior.

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Mockups, references, or examples.
